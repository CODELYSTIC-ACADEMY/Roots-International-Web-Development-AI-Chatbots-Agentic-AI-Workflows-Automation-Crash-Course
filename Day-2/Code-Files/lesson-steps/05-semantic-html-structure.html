<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic HTML Structure</title>
</head>
<body>

  <header>
    <h1>My Portfolio</h1>

    <nav>
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="about">
      <h2>About Me</h2>
      <p>This section introduces who I am.</p>
    </section>

    <section id="skills">
      <h2>My Skills</h2>
      <p>This section shows what I am learning.</p>
    </section>
  </main>

  <footer>
    <p>© 2026 My Portfolio Website.</p>
  </footer>

</body>
</html>
